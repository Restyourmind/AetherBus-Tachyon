syntax = "proto3";
package aetherbus.v1;

// กำหนดการตั้งค่าสำหรับการสร้างโค้ดข้ามแพลตฟอร์มภาษาต่างๆ
option go_package = "github.com/aetherbus/api/proto/v1;aetherbusv1";
option java_multiple_files = true;
option java_package = "com.aetherbus.api.v1";
option csharp_namespace = "AetherBus.Api.V1";

// โครงสร้างหลักของแพ็กเก็ตข้อมูลบนเครือข่าย AetherBus
message Event {
    string id = 1;                     // รหัสอ้างอิงเฉพาะ (UUID)
    string topic = 2;                  // คีย์เส้นทางหัวข้อ (เช่น "telemetry.sensor.alpha")
    bytes payload = 3;                 // ข้อมูลไบนารีที่บรรจุเพย์โหลด
    int64 timestamp_ns = 4;            // การประทับเวลาในระดับนาโนวินาที
    CompressionType compression = 5;   // ตัวบ่งชี้อัลกอริทึมการบีบอัดข้อมูล
}

// อัลกอริทึมการบีบอัดข้อมูลที่รองรับในระดับสายส่ง
enum CompressionType {
    COMPRESSION_UNSPECIFIED = 0;       // ค่าเริ่มต้น
    COMPRESSION_NONE = 1;
    COMPRESSION_LZ4 = 2;               // สำหรับความหน่วงต่ำสุด
    COMPRESSION_ZSTD = 3;              // สำหรับปริมาณข้อมูลหนาแน่น
}

message PublishResponse {
    bool success = 1;
    string message = 2;
}

message SubscribeRequest {
    string topic_filter = 1;           // หัวข้อที่ต้องการดึงข้อมูล รองรับ Wildcard
}

// บริการสาธารณะในการเชื่อมต่อเข้ากับโหนด AetherBus


message DeadLetterRecord {
    string message_id = 1;
    string consumer_id = 2;
    string topic = 3;
    bytes payload = 4;
    string reason = 5;
    int32 attempt = 6;
    string dead_lettered_at = 7;
}

message DeadLetterListRequest {
    string consumer_id = 1;
    string topic = 2;
    string reason = 3;
}

message DeadLetterListResponse {
    repeated DeadLetterRecord records = 1;
}

message DeadLetterInspectRequest {
    string message_id = 1;
}

message DeadLetterReplayRequest {
    repeated string message_ids = 1;
    string target_consumer_id = 2;
    string target_topic = 3;
    string confirm = 4;
}

message DeadLetterReplayFailure {
    string message_id = 1;
    string error = 2;
}

message DeadLetterReplayResponse {
    uint32 requested = 1;
    uint32 replayed = 2;
    uint32 failed = 3;
    repeated DeadLetterReplayFailure failures = 4;
}

message DeadLetterPurgeRequest {
    repeated string message_ids = 1;
    string consumer_id = 2;
    string topic = 3;
    string reason = 4;
    string confirm = 5;
}

message DeadLetterPurgeResponse {
    uint32 requested = 1;
    uint32 purged = 2;
    uint32 failed = 3;
    repeated DeadLetterReplayFailure failures = 4;
}

service AetherBusService {
    // Unary RPC: เผยแพร่ข้อมูลเดี่ยว
    rpc PublishEvent(Event) returns (PublishResponse);
    
    // Client Streaming: ส่งข้อมูลปริมาณมากเป็นชุดต่อเนื่องด้วยความเร็วสูง
    rpc StreamPublish(stream Event) returns (PublishResponse);
    
    // Server Streaming: ติดตามหัวข้อแบบเรียลไทม์
    rpc Subscribe(SubscribeRequest) returns (stream Event);
    
    // Duplex Streaming: สตรีมโต้ตอบแบบสองทิศทาง หน่วงเวลาต่ำ
    rpc DuplexConnect(stream Event) returns (stream Event);

    rpc ListDeadLetters(DeadLetterListRequest) returns (DeadLetterListResponse);
    rpc InspectDeadLetter(DeadLetterInspectRequest) returns (DeadLetterRecord);
    rpc ReplayDeadLetters(DeadLetterReplayRequest) returns (DeadLetterReplayResponse);
    rpc PurgeDeadLetters(DeadLetterPurgeRequest) returns (DeadLetterPurgeResponse);
}
