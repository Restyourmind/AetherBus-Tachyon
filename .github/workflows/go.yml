name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: go-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-sanity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run offline-safe checks
        run: bash scripts/go_mod_recovery.sh check

  full-recovery:
    runs-on: ubuntu-latest
    needs: offline-sanity
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ZeroMQ
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libzmq3-dev

      - name: Run full online recovery
        run: bash scripts/go_mod_recovery.sh recover

      - name: Run full test suite
        run: go test ./...
